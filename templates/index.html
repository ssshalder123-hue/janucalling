<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janu Calling - Professional Multi-Lang</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            --success-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            --login-gradient: linear-gradient(135deg, #232526 0%, #414345 100%);
            --offline-gradient: linear-gradient(135deg, #606c88 0%, #3f2b96 100%);
            --dark-color: #1e2129;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: radial-gradient(circle at top, #ff9a9e 0%, #fecfef 99%, #f1f2f6 100%);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .container { 
            max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 25px 20px; border-radius: 30px; 
            box-shadow: 0px 20px 40px rgba(255, 71, 87, 0.15); 
            box-sizing: border-box; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 { 
            font-size: 26px; font-weight: 800;
            background: linear-gradient(45deg, #ff0844, #ff4e50);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 15px 0; text-align: center;
        }
        
        hr { border: 0; height: 1px; background: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.08), rgba(0,0,0,0)); margin: 15px 0; }
        
        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 14px; 
            border: 1.5px solid rgba(0, 0, 0, 0.05); box-sizing: border-box; font-size: 15px; 
            background: rgba(248, 249, 250, 0.8); transition: all 0.3s;
        }
        input:focus { border-color: #ff4757; outline: none; background: #fff; }

        button { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 14px; color: white; 
            font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.98); }

        .btn-primary { background: var(--primary-gradient); }
        .btn-login { background: var(--login-gradient); }
        .btn-online { background: var(--success-gradient); }
        .btn-offline { background: var(--offline-gradient); }

        .hidden { display: none !important; }
        .status-box { padding: 14px; margin: 15px 0; border-radius: 14px; font-weight: 700; background: #e8fbf0; color: #00b09b; text-align: center; }

        .tab-system { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: rgba(0,0,0,0.04); color: #57606f; padding: 11px; font-size: 14px; border-radius: 10px; width: 50%; }
        .tab-btn.active { background: var(--primary-gradient); color: white; }

        /* 📱 আল্ট্রা-প্রফেশনাল কল কার্ড (ডিজাইন ফিক্সড) */
        .call-card {
            background: #14171f; color: white; padding: 30px 20px; border-radius: 24px; margin: 15px 0;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* 💖 লোগো পালস ও স্পিন ইফেক্ট */
        .avatar { 
            width: 80px; height: 80px; background: var(--primary-gradient); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 34px; margin: 0 auto 15px auto; animation: ripple 1.5s infinite; 
        }
        .call-state { font-size: 14px; color: #a4b0be; margin: 5px 0 20px 0; font-weight: 500; }

        /* 🛠️ একক থ্রি-বাটন কন্ট্রোল সিস্টেম (অতিরিক্ত বাটন ছাড়া) */
        .control-panel { display: flex; justify-content: center; gap: 20px; margin-top: 15px; width: 100%; }
        .round-btn {
            width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: all 0.2s; border: none; color: white; padding: 0; margin: 0;
        }
        .round-btn span { font-size: 10px; font-weight: 600; margin-top: 2px; color: #a4b0be; }
        .round-btn.active { background: #ffffff; color: #14171f; }
        .round-btn.active span { color: #14171f; }
        .round-btn.btn-hangup { background: linear-gradient(135deg, #ff0844 0%, #ff4e50 100%); width: 60px; height: 60px; box-shadow: 0 5px 15px rgba(255,8,68,0.4); }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.4), 0 0 0 0 rgba(255, 8, 68, 0.3); }
            70% { box-shadow: 0 0 0 15px rgba(255, 8, 68, 0), 0 0 0 10px rgba(255, 8, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0), 0 0 0 0 rgba(255, 8, 68, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>❤️ Janu Calling App ❤️</h2>
    <hr>

    <!-- ১. লগইন/রেজিস্ট্রেশন প্যানেল -->
    <div id="auth-section">
        <div class="tab-system">
            <button class="tab-btn active" id="tab-reg-btn" onclick="switchTab('reg')">নতুন অ্যাকাউন্ট</button>
            <button class="tab-btn" id="tab-login-btn" onclick="switchTab('login')">লগইন</button>
        </div>

        <div id="reg-form">
            <input type="text" id="reg-name" placeholder="আপনার নাম লিখুন">
            <input type="number" id="reg-phone" placeholder="মোবাইল নম্বর দিন">
            <select id="reg-gender">
                <option value="male">🙋‍♂️ আমি একজন ছেলে (Customer)</option>
                <option value="female">🙋‍♀️ আমি একজন মেয়ে (Hosting)</option>
            </select>
            <button class="btn-primary" onclick="registerUser()">🎁 অ্যাকাউন্ট তৈরি করুন</button>
        </div>

        <div id="login-form" class="hidden">
            <input type="number" id="login-phone" placeholder="আপনার রেজিস্টার্ড মোবাইল নম্বর">
            <button class="btn-login" onclick="loginUser()">🔓 লগইন করুন</button>
        </div>
    </div>

    <!-- 📱 প্রফেশনাল ইন-অ্যাপ লাইভ কল প্যানেল (একক বাটন সিস্টেম) -->
    <div id="call-box" class="call-card hidden">
        <div class="avatar">❤️</div>
        <h3 id="call-person-name" style="color: white; margin: 0;">Connecting...</h3>
        <div class="call-state" id="call-status-label">Calling...</div>

        <!-- ৩টি প্রফেশনাল ভিন্ন কাজের বাটন -->
        <div class="control-panel">
            <button class="round-btn" id="mute-btn" onclick="toggleMute()">
                <span id="mute-icon">🎙️</span><span>Mute</span>
            </button>
            <button class="round-btn" id="speaker-btn" onclick="toggleSpeaker()">
                <span>🔊</span><span>Speaker</span>
            </button>
            <button class="round-btn btn-hangup" onclick="hangUpCall()">
                <span>🛑</span><span>End</span>
            </button>
        </div>
    </div>

    <!-- ২. কাস্টমার (ছেলেদের) ড্যাশবোর্ড -->
    <div id="boy-dashboard" class="hidden">
        <h3>👋 স্বাগতম কাস্টমার, <span id="boy-name-display" style="color: #ff0844;"></span></h3>
        <div class="status-box">💰 আপনার ব্যালেন্স: ৳<span id="balance-display">0</span> (খরচ: ৳২ / মিনিট)</div>
        <button class="btn-online" id="boy-call-action-btn" onclick="startInAppCall()">📞 এখনই কল করুন</button>
    </div>

    <!-- ৩. হোস্টিং (মেয়েদের) ড্যাশবোর্ড -->
    <div id="girl-dashboard" class="hidden">
        <h3>👋 স্বাগতম হোস্ティング, <span id="girl-name-display" style="color: #ff0844;"></span></h3>
        <p style="color: #57606f; text-align: center; font-weight: 500;">অনলাইন থাকলে আপনার ফোনে লাইভ কল আসবে:</p>
        <button class="btn-online" id="girl-online-btn" onclick="updateStatus('available')">🟢 অনলাইন যান</button>
        <button class="btn-offline" id="girl-offline-btn" onclick="updateStatus('offline')">⚫ অফলাইন যান</button>
        <div id="girl-status-text" style="margin-top: 15px; font-weight:bold; text-align: center;"></div>
    </div>
</div>

<audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1360/1360-84.wav" loop preload="auto"></audio>

<script>
    let myPhone = ""; let myGender = ""; let currentRoomId = "";
    let callTimerInterval; let checkIncomingInterval; let balanceInterval; let checkAcceptInterval; let syncInterval;
    let seconds = 0; let isMuted = false; let isSpeaker = false;
    
    let localStream; let peerConnection;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

    function switchTab(type) {
        if(type === 'reg') {
            document.getElementById('reg-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('tab-reg-btn').classList.add('active');
            document.getElementById('tab-login-btn').classList.remove('active');
        } else {
            document.getElementById('reg-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('tab-reg-btn').classList.remove('active');
            document.getElementById('tab-login-btn').classList.add('active');
        }
    }

    async function registerUser() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !phone) return alert("সব তথ্য সঠিকভাবে দিন!");

        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, gender })
        });
        const data = await response.json();
        if(data.status === "success") { alert(data.message); openDashboard(data); } else { alert(data.message); }
    }

    async function loginUser() {
        const phone = document.getElementById('login-phone').value;
        if(!phone) return alert("মোবাইল নম্বর দিন!");
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });
        const data = await response.json();
        if(data.status === "success") { openDashboard(data); } else { alert(data.message); }
    }

    function openDashboard(data) {
        myPhone = data.phone; myGender = data.gender;
        document.getElementById('auth-section').classList.add('hidden');
        if(myGender === 'male') {
            document.getElementById('boy-name-display').innerText = data.name;
            document.getElementById('balance-display').innerText = data.balance;
            document.getElementById('boy-dashboard').classList.remove('hidden');
        } else {
            document.getElementById('girl-name-display').innerText = data.name;
            document.getElementById('girl-dashboard').classList.remove('hidden');
            updateStatus('available');
            checkIncomingInterval = setInterval(checkIncomingCalls, 3000);
        }
    }

    async function updateStatus(status) {
        await fetch('/update_status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: myPhone, status })
        });
        document.getElementById('girl-status-text').innerHTML = status === 'available' ? '<span style="color:#00b09b;">আপনি এখন অনলাইন আছেন</span>' : '<span style="color:#747d8c;">আপনি এখন অফলাইন আছেন</span>';
    }

    // 🔊 WebRTC হাই-কোয়ালিটি অডিও ট্র্যাকিং প্লাগইন ফিক্স
    async function startAudioTransmission() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                let remoteAudio = document.getElementById('remote-audio-player');
                if(!remoteAudio) {
                    remoteAudio = document.createElement('audio');
                    remoteAudio.id = 'remote-audio-player';
                    remoteAudio.autoplay = true;
                    if (isSpeaker) remoteAudio.setSinkId && remoteAudio.setSinkId(""); 
                    document.body.appendChild(remoteAudio);
                }
                remoteAudio.srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) { console.log("ICE Candidate generated"); }
            };
        } catch (e) { alert("মাইক্রোফোন পারমিশন সচল করুন!"); }
    }

    // 🙋‍♂️ কাস্টমার কল মেকানিজম (বাটন হাইড ফিক্স)
    async function startInAppCall() {
        const response = await fetch('/make_call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: myPhone })
        });
        const data = await response.json();
        
        if(data.status === "ringing") {
            currentRoomId = data.room_id;
            
            // ড্যাশবোর্ডের বাটন সম্পূর্ণ লুকিয়ে ফেলা হলো ঝামেলা এড়াতে
            document.getElementById('boy-dashboard').classList.add('hidden');
            document.getElementById('call-person-name').innerText = data.girl_name;
            document.getElementById('call-status-label').innerText = "Ringing (ঘণ্টি বাজছে)...";
            document.getElementById('call-box').classList.remove('hidden');
            
            try { document.getElementById('ringtone').play(); } catch(e){}

            // ২ সেকেন্ড পর পর লাইভ রিয়েল-টাইম ডিসকানেক্ট ট্র্যাকার চালু
            syncInterval = setInterval(checkCallSyncStatus, 2000);

            checkAcceptInterval = setInterval(async () => {
                const checkRes = await fetch('/check_incoming', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: data.girl_phone })
                });
                const checkData = await checkRes.json();
                
                // মেয়ে রিসিভ করলেই কেবল কল কানেক্ট হবে!
                if(!checkData.incoming) { 
                    clearInterval(checkAcceptInterval);
                    try { document.getElementById('ringtone').pause(); } catch(e){}
                    await startAudioTransmission();
                    startCallDurationTimer(); 
                }
            }, 3000);
        } else { alert(data.message); }
    }

    // 🙋‍♀️ হোস্টিং ইনকামিং কল মেকানিজম
    async function checkIncomingCalls() {
        if (document.getElementById('call-box').classList.contains('hidden')) {
            const response = await fetch('/check_incoming', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: myPhone })
            });
            const data = await response.json();
            
            if(data.incoming) {
                currentRoomId = data.room_id;
                document.getElementById('girl-dashboard').classList.add('hidden');
                document.getElementById('call-person-name').innerText = data.boy_name;
                document.getElementById('call-status-label').innerText = "⚠️ ইনকামিং কল... (অনলাইন রিসিভ বাটন)";
                
                // মেয়েদের রিসিভ বাটনটি ৩-কন্ট্রোল প্যানেলে সাময়িকভাবে রূপান্তর
                document.getElementById('mute-btn').innerHTML = "🟢<span>Accept</span>";
                document.getElementById('mute-btn').onclick = acceptIncomingCall;
                document.getElementById('speaker-btn').innerHTML = "🛑<span>Decline</span>";
                document.getElementById('speaker-btn').onclick = hangUpCall;
                
                document.getElementById('call-box').classList.remove('hidden');
                try { document.getElementById('ringtone').play(); } catch(e){}

                syncInterval = setInterval(checkCallSyncStatus, 2000);
            }
        }
    }

    async function acceptIncomingCall() {
        try { document.getElementById('ringtone').pause(); } catch(e){}
        
        // বাটনগুলোকে আবার সাধারণ Mute/Speaker এ ফিরিয়ে আনা হলো
        document.getElementById('mute-btn').innerHTML = "<span id='mute-icon'>🎙️</span><span>Mute</span>";
        document.getElementById('mute-btn').onclick = toggleMute;
        document.getElementById('speaker-btn').innerHTML = "<span>🔊</span><span>Speaker</span>";
        document.getElementById('speaker-btn').onclick = toggleSpeaker;
        
        await startAudioTransmission();
        
        const response = await fetch('/accept_call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_id: currentRoomId })
        });
        const data = await response.json();
        if(data.status === 'connected') {
            startCallDurationTimer();
        }
    }

    // 🔄 রিয়াল-টাইম ডাবল ডিসকানেক্ট চেকার প্লাগইন
    async function checkCallSyncStatus() {
        if (!currentRoomId) return;
        const response = await fetch('/check_incoming', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: myPhone })
        });
        // যদি ব্যাকএ্যান্ডে কলটি ডিলিট হয়ে যায় (অপরপক্ষ কেটে দিয়েছে)
        if (response.status === 404 || currentRoomId === "") {
            cleanUpCallUI();
        }
    }

    function startCallDurationTimer() {
        if(callTimerInterval) clearInterval(callTimerInterval);
        if(balanceInterval) clearInterval(balanceInterval);
        
        seconds = 0;
        document.getElementById('call-status-label').innerText = "Connected (00:00)";
        
        callTimerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('call-status-label').innerText = `Connected (${mins}:${secs})`;
        }, 1000);

        if(myGender === 'male') {
            balanceInterval = setInterval(async () => {
                const res = await fetch('/deduct_minute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ boy_phone: myPhone, room_id: currentRoomId })
                });
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('balance-display').innerText = data.new_balance;
                } else {
                    alert("পর্যাপ্ত ব্যালেন্স নেই! কল বিচ্ছিন্ন করা হলো।");
                    hangUpCall();
                }
            }, 60000); 
        }
    }

    // 🔇 Mute বাটন ফাংশন
    function toggleMute() {
        isMuted = !isMuted;
        if(localStream) {
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('mute-btn').classList.toggle('active', isMuted);
            document.getElementById('mute-icon').innerText = isMuted ? "🔇" : "🎙️";
        }
    }

    // 🔊 Speaker বাটন ফাংশন
    function toggleSpeaker() {
        isSpeaker = !isSpeaker;
        document.getElementById('speaker-btn').classList.toggle('active', isSpeaker);
