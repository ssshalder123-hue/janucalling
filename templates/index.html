<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janu Calling - Live Control Panel</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --success-color: #2ed573;
            --dark-color: #2f3542;
            --body-bg: #f1f2f6;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(180deg, #ffe4e6 0%, var(--body-bg) 100%); 
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .container { 
            max-width: 420px; width: 100%; background: #ffffff; 
            padding: 25px 20px; border-radius: 24px; 
            box-shadow: 0px 15px 35px rgba(255, 71, 87, 0.12); 
            box-sizing: border-box; position: relative;
        }

        h2 { color: var(--primary-color); margin: 0 0 15px 0; font-size: 24px; text-align: center; }
        h3 { color: var(--dark-color); font-size: 18px; margin-top: 5px; text-align: center; }
        hr { border: 0; height: 1px; background: rgba(0,0,0,0.08); margin: 15px 0; }
        
        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1.5px solid #e4e7eb; box-sizing: border-box; font-size: 15px; background: #f8f9fa;
        }

        button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; color: white; 
            font-size: 16px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.97); }

        /* বাটন কালার কোড */
        .btn-primary { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-login { background: #2f3542; }
        .btn-online { background: linear-gradient(135deg, #2ed573, #1abc9c); }
        .btn-offline { background: #747d8c; }
        .btn-decline { background: #ff4757; }

        .hidden { display: none !important; }
        .status-box { padding: 15px; margin: 15px 0; border-radius: 12px; font-weight: 600; background: #e8fbf0; color: #2ed573; border: 1px solid #cbf7df; font-size: 16px; text-align: center; }

        .tab-system { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #e4e7eb; color: #57606f; padding: 10px; font-size: 14px; border-radius: 8px; width: 50%; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        /* কল স্ক্রিন ডিজাইন */
        .call-card {
            background: #1e222b; color: white; padding: 20px; border-radius: 18px; margin: 15px 0;
            text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .avatar { width: 70px; height: 70px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 10px auto; animation: ripple 1.5s infinite; }
        .call-state { font-size: 15px; color: #a4b0be; margin: 5px 0 15px 0; }
        .incoming-buttons { display: flex; gap: 10px; }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>❤️ Janu friend Calling App ❤️</h2>
    <hr>

    <div id="auth-section">
        <div class="tab-system">
            <button class="tab-btn active" id="tab-reg-btn" onclick="switchTab('reg')">নতুন অ্যাকাউন্ট</button>
            <button class="tab-btn" id="tab-login-btn" onclick="switchTab('login')">লগইন</button>
        </div>

        <div id="reg-form">
            <input type="text" id="reg-name" placeholder="আপনার নাম লিখুন">
            <input type="number" id="reg-phone" placeholder="মোবাইল নম্বর দিন">
            <select id="reg-gender">
                <option value="male">🙋‍♂️ আমি একজন ছেলে (Male)</option>
                <option value="female">🙋‍♀️ আমি একজন মেয়ে (female Hosting)</option>
            </select>
            <button class="btn-primary" onclick="handleRegister()">🎁 অ্যাকাউন্ট তৈরি করুন</button>
        </div>

        <div id="login-form" class="hidden">
            <input type="number" id="login-phone" placeholder="আপনার রেজিস্টার্ড মোবাইল নম্বর">
            <button class="btn-login" onclick="handleLogin()">🔓 লগইন করুন</button>
        </div>
    </div>

    <div id="call-box" class="call-card hidden">
        <div class="avatar">❤️</div>
        <h3 id="call-person-name" style="color: white; margin: 5px 0;">Connecting...</h3>
        <div class="call-state" id="call-status-label">Calling...</div>

        <div id="incoming-actions" class="incoming-buttons hidden">
            <button class="btn-online" id="btn-accept" onclick="acceptIncomingCall()">🟢 রিসিভ করুন</button>
            <button class="btn-decline" id="btn-decline" onclick="hangUpCall()">🛑 কেটে দিন</button>
        </div>

        <div id="active-actions">
            <button class="btn-decline" id="btn-end" onclick="hangUpCall()">🛑 কল শেষ করুন</button>
        </div>
    </div>

    <div id="boy-dashboard" class="hidden">
        <h3>👋 স্বাগতম কাস্টমার, <span id="boy-name-display" style="color: var(--primary-color);"></span></h3>
        <div class="status-box">💰 আপনার ব্যালেন্স: টাকা<span id="balance-display">0</span> (খরচ: টাকা ২ / মিনিট)</div>
        <button class="btn-online" onclick="startInAppCall()">📞 এখনই কল করুন</button>
    </div>

    <div id="girl-dashboard" class="hidden">
        <h3>👋 স্বাগতম হোস্ティング, <span id="girl-name-display" style="color: var(--primary-color);"></span></h3>
        <p>অনলাইন থাকলে আপনার ফোনে লাইভ ইনকামিং কল আসবে:</p>
        <button class="btn-online" onclick="updateStatus('available')">🟢 অনলাইন যান</button>
        <button class="btn-offline" onclick="updateStatus('offline')">🔴 অফলাইন যান</button>
        <div id="girl-status-text" style="margin-top: 15px; font-weight:bold; text-align: center;"></div>
    </div>
</div>

<audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1360/1360-84.wav" loop preload="auto"></audio>

<script>
    let myPhone = ""; let myGender = ""; let currentRoomId = "";
    let callTimerInterval; let checkIncomingInterval; let balanceInterval; let checkAcceptInterval;
    let seconds = 0;
    
    let localStream; let peerConnection;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function switchTab(type) {
        if(type === 'reg') {
            document.getElementById('reg-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('tab-reg-btn').classList.add('active');
            document.getElementById('tab-login-btn').classList.remove('active');
        } else {
            document.getElementById('reg-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('tab-reg-btn').classList.remove('active');
            document.getElementById('tab-login-btn').classList.add('active');
        }
    }

    // 📡 ব্যাকএন্ড রেজিস্ট্রেশন ফিক্স
    async function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !phone) return alert("সব তথ্য সঠিকভাবে দিন!");

        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, gender })
        });
        const data = await response.json();
        if(data.status === "success") { alert(data.message); openDashboard(data); } else { alert(data.message); }
    }

    // 📡 ব্যাকএন্ড লগইন ফিক্স
    async function handleLogin() {
        const phone = document.getElementById('login-phone').value;
        if(!phone) return alert("মোবাইল নম্বর দিন!");
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });
        const data = await response.json();
        if(data.status === "success") { openDashboard(data); } else { alert(data.message); }
    }

    function openDashboard(data) {
        myPhone = data.phone; myGender = data.gender;
        document.getElementById('auth-section').classList.add('hidden');
        if(myGender === 'male') {
            document.getElementById('boy-name-display').innerText = data.name;
            document.getElementById('balance-display').innerText = data.balance;
            document.getElementById('boy-dashboard').classList.remove('hidden');
        } else {
            document.getElementById('girl-name-display').innerText = data.name;
            document.getElementById('girl-dashboard').classList.remove('hidden');
            updateStatus('available');
            checkIncomingInterval = setInterval(checkIncomingCalls, 3000);
        }
    }

    async function updateStatus(status) {
        await fetch('/update_status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: myPhone, status })
        });
        document.getElementById('girl-status-text').innerHTML = status === 'available' ? '<span style="color:#2ed573;">আপনি এখন অনলাইন আছেন</span>' : '<span style="color:#747d8c;">আপনি এখন অফলাইন আছেন</span>';
    }

    async function startAudioTransmission() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                let remoteAudio = document.getElementById('remote-audio-player');
                if(!remoteAudio) {
                    remoteAudio = document.createElement('audio');
                    remoteAudio.id = 'remote-audio-player';
                    remoteAudio.autoplay = true;
                    document.body.appendChild(remoteAudio);
                }
                remoteAudio.srcObject = event.streams[0];
            };
        } catch (e) { alert("মাইক্রোফোন পারমিশন সচল করুন!"); }
    }

    // 📞 ইন-অ্যাপ কল মেকানিজম (ছেলেদের দিক থেকে)
    async function startInAppCall() {
        const response = await fetch('/make_call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: myPhone })
        });
        const data = await response.json();
        
        if(data.status === "ringing") {
            currentRoomId = data.room_id;
            document.getElementById('call-person-name').innerText = data.girl_name;
            document.getElementById('call-status-label').innerText = "Ringing (ঘণ্টি বাজছে)...";
            document.getElementById('incoming-actions').classList.add('hidden');
            document.getElementById('call-box').classList.remove('hidden');
            try { document.getElementById('ringtone').play(); } catch(e){}

            // মেয়ে কল রিসিভ করেছে কিনা চেক করার সঠিক লুপ
            checkAcceptInterval = setInterval(async () => {
                const checkRes = await fetch('/check_incoming', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: data.girl_phone })
                });
                const checkData = await checkRes.json();
                
                if(!checkData.incoming) { 
                    clearInterval(checkAcceptInterval);
                    try { document.getElementById('ringtone').pause(); } catch(e){}
                    await startAudioTransmission();
                    startCallDurationTimer(); 
                }
            }, 3000);
        } else { alert(data.message); }
    }

    // 📞 ইনকামিং কল চেক (মেয়েদের দিক থেকে)
    async function checkIncomingCalls() {
        if (document.getElementById('call-box').classList.contains('hidden')) {
            const response = await fetch('/check_incoming', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: myPhone })
            });
            const data = await response.json();
            
            if(data.incoming) {
                currentRoomId = data.room_id;
                document.getElementById('call-person-name').innerText = data.boy_name;
                document.getElementById('call-status-label').innerText = "📞 ইনকামিং কল আসছে...";
                document.getElementById('incoming-actions').classList.remove('hidden');
                document.getElementById('call-box').classList.remove('hidden');
                try { document.getElementById('ringtone').play(); } catch(e){}
            }
        }
    }

    async function acceptIncomingCall() {
        try { document.getElementById('ringtone').pause(); } catch(e){}
        await startAudioTransmission();
        
        const response = await fetch('/accept_call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_id: currentRoomId })
        });
        const data = await response.json();
        if(data.status === 'connected') {
            document.getElementById('incoming-actions').classList.add('hidden');
            startCallDurationTimer();
        }
    }

    // ⏱️ সঠিক টাইমার ও রিয়েল ব্যালেন্স ডিডাকশন
    function startCallDurationTimer() {
        if(callTimerInterval) clearInterval(callTimerInterval);
        if(balanceInterval) clearInterval(balanceInterval);
        
        seconds = 0;
        document.getElementById('call-status-label').innerText = "Connected (00:00)";
        
        callTimerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('call-status-label').innerText = `Connected (${mins}:${secs})`;
        }, 1000);

        if(myGender === 'male') {
            balanceInterval = setInterval(async () => {
                const res = await fetch('/deduct_minute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ boy_phone: myPhone, room_id: currentRoomId })
                });
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('balance-display').innerText = data.new_balance;
                } else {
                    alert("পর্যাপ্ত ব্যালেন্স নেই! কল বিচ্ছিন্ন করা হলো।");
                    hangUpCall();
                }
            }, 60000); 
        }
    }

    async function hangUpCall() {
        try { document.getElementById('ringtone').pause(); document.getElementById('ringtone').currentTime = 0; } catch(e){}
        if(callTimerInterval) clearInterval(callTimerInterval); 
        if(balanceInterval) clearInterval(balanceInterval);
        if(checkAcceptInterval) clearInterval(checkAcceptInterval);
        
        if(localStream) { localStream.getTracks().forEach(track => track.stop()); }
        if(peerConnection) { peerConnection.close(); }
        
        const remoteAudio = document.getElementById('remote-audio-player');
        if(remoteAudio) remoteAudio.remove();

        await fetch('/end_call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_id: currentRoomId })
        });

        document.getElementById('call-box').classList.add('hidden');
        alert("কল শেষ হয়েছে।");
    }
</script>
</body>
</html>
