<button onclick="registerUser()">Register</button>

<script>
async function registerUser() {

const response = await fetch('/register',{
 method:'POST',
 headers:{
   'Content-Type':'application/json'
 },
 body:JSON.stringify({
   name:'Rahim',
   phone:'9876543210',
   gender:'Male',
   password:'123456'
 })
});

const result = await response.json();

alert(result.message);

}
</script>
